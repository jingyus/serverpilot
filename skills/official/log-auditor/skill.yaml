kind: skill
version: "1.0"

metadata:
  name: log-auditor
  displayName: "智能日志审查"
  description: "定期分析系统日志，AI 识别异常模式、安全威胁和服务故障，生成结构化报告"
  version: "1.0.0"
  author: "serverpilot-official"
  tags: [security, monitoring, logs]

triggers:
  - type: cron
    schedule: "0 8 * * *"       # 每天早上 8:00
  - type: event
    on: alert.triggered
    filter:
      severity: [warning, critical]
  - type: manual

tools:
  - shell
  - read_file
  - notify
  - store

inputs:
  - name: log_sources
    type: string[]
    required: false
    default: ["/var/log/syslog", "/var/log/auth.log", "/var/log/kern.log"]
    description: "要审查的日志文件路径（AI 会自动检测系统类型并调整）"

  - name: lookback_hours
    type: number
    required: false
    default: 24
    description: "回溯多少小时的日志"

  - name: severity_threshold
    type: enum
    required: false
    default: warning
    options: [info, warning, critical]
    description: "达到此级别才发送通知"

constraints:
  risk_level_max: green          # 只需要读取权限，不修改任何内容
  timeout: "3m"
  max_steps: 15
  requires_confirmation: false
  server_scope: single

requires:
  os: [linux]

prompt: |
  ## 角色
  你是一个专业的 Linux 服务器日志分析专家，擅长从海量日志中识别安全威胁、服务异常和性能问题。

  ## 目标
  审查服务器 {{server.name}} ({{server.os}}) 最近 {{input.lookback_hours}} 小时的系统日志，识别异常并生成报告。

  ## 环境信息
  - 服务器: {{server.name}} ({{server.os}})
  - IP: {{server.ip}}
  - 上次审查: {{skill.last_run}}
  - 上次结果摘要: {{skill.last_result}}

  ## 执行指南
  1. **检测系统类型** — 判断是使用 journalctl (systemd) 还是传统日志文件，不要假设
  2. **收集日志** — 读取以下来源的日志（根据系统实际情况调整）：
     - 系统日志: syslog / journalctl
     - 认证日志: auth.log / secure
     - 内核日志: kern.log / dmesg
     - 用户指定的额外来源: {{input.log_sources}}
  3. **分析异常** — 重点关注：
     - SSH 暴力破解尝试（大量 Failed password）
     - 异常登录（非常规时间、未知 IP、root 直接登录）
     - 服务崩溃或频繁重启（segfault、OOM killer、service failed）
     - 磁盘错误（I/O error、filesystem remounted read-only）
     - 可疑进程（异常 cron 任务、未知守护进程）
     - 内核告警（oom-killer、hardware error）
  4. **对比历史** — 如果有上次运行结果，标注新增的异常
  5. **发送通知** — 如果 severity >= {{input.severity_threshold}}，使用 notify 发送告警
  6. **存储结果** — 使用 store 保存本次分析摘要，供下次对比

  ## 注意事项
  - 只使用只读命令，不要修改任何文件或配置
  - 日志量可能很大，使用 tail/grep/journalctl 的时间过滤参数限制范围
  - 如果某个日志文件不存在，跳过它，不要报错

  ## 输出要求
  以 JSON 格式输出最终结果：
  ```json
  {
    "severity": "info | warning | critical",
    "summary": "一句话总结审查结果",
    "period": "审查的时间范围",
    "findings": [
      {
        "category": "分类（auth/service/disk/kernel/suspicious）",
        "severity": "info | warning | critical",
        "description": "具体描述",
        "evidence": "相关日志片段（限 3 行）",
        "recommendation": "建议操作"
      }
    ],
    "stats": {
      "total_entries_scanned": 0,
      "warnings": 0,
      "critical": 0
    }
  }
  ```

outputs:
  - name: report
    type: object
    description: "完整的审查报告 JSON"
  - name: severity
    type: string
    description: "最高严重级别: info | warning | critical"
