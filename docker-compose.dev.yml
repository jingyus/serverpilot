# ==============================================================================
# ServerPilot - Development Docker Compose Configuration
# ==============================================================================
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# Features:
#   - Source code mounted as volumes (hot reload)
#   - Node.js debug ports exposed
#   - Verbose logging (debug level)
#   - No image caching for rapid iteration
# ==============================================================================

services:
  # ==============================================================================
  # Server (development mode with source mounting)
  # ==============================================================================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: build
    container_name: serverpilot-server-dev
    restart: unless-stopped
    command: >
      sh -c "
        cd /app &&
        npx pnpm --filter @aiinstaller/shared build &&
        npx pnpm --filter @aiinstaller/server build &&
        node packages/server/dist/index.js
      "
    environment:
      - NODE_ENV=development
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      - DATABASE_PATH=/data/serverpilot.db
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_for_local_testing_only}
      - LOG_LEVEL=debug
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-20250514}
      - WS_REQUIRE_AUTH=${WS_REQUIRE_AUTH:-false}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - KB_RUN_ON_START=false
    ports:
      - "3001:3000"
      - "9229:9229"
    volumes:
      - server-data-dev:/data
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./packages/server/src:/app/packages/server/src:ro
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - serverpilot-dev-network

  # ==============================================================================
  # Dashboard (development mode - nginx with live build)
  # ==============================================================================
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: serverpilot-dashboard-dev
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    networks:
      - serverpilot-dev-network

networks:
  serverpilot-dev-network:
    driver: bridge

volumes:
  server-data-dev:
    driver: local
