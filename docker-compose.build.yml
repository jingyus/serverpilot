# ==============================================================================
# ServerPilot - Docker Compose Build Override (Source Code)
# ==============================================================================
# Usage (build from source):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# This override adds build contexts so images are built locally from source.
# Use this for development or when pre-built images are not available.
# ==============================================================================

services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile

  agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
