name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @aiinstaller/shared build

      - name: Build native modules for E2E
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          DATABASE_PATH: ':memory:'
          JWT_SECRET: 'ci-e2e-test-secret-key-minimum-32-chars-long'
          WS_REQUIRE_AUTH: 'false'
          LOG_LEVEL: 'warn'
          AI_PROVIDER: 'ollama'
          OLLAMA_BASE_URL: 'http://localhost:11434'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/
          retention-days: 7

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml build --no-cache && docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
        env:
          JWT_SECRET: 'ci-smoke-test-secret-key-minimum-32-chars-long'
          AI_PROVIDER: 'claude'
          LOG_LEVEL: 'warn'
          ADMIN_EMAIL: 'admin@serverpilot.local'
          ADMIN_PASSWORD: 'SmokeTestAdmin123!'

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh --wait 90 --verbose --test-persistence
        env:
          HOST: localhost
          PORT: 3001
          ADMIN_EMAIL: 'admin@serverpilot.local'
          ADMIN_PASSWORD: 'SmokeTestAdmin123!'

      - name: Collect container logs
        if: always()
        run: docker compose logs --tail=200 > docker-smoke-logs.txt 2>&1

      - name: Upload smoke test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-smoke-logs
          path: docker-smoke-logs.txt
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v
