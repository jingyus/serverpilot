name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux (Ubuntu x64)
            node-version: 22
          - os: macos-latest
            name: macOS (arm64)
            node-version: 22
          - os: macos-13
            name: macOS (x64)
            node-version: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show platform info
        run: |
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          echo "Node: $(node -v)"
          echo "pnpm: $(pnpm -v)"

      - name: Run tests
        run: pnpm test

      - name: Run multi-platform tests
        run: pnpm vitest run tests/multi-env-macos.test.ts tests/multi-env-linux.test.ts

      - name: Run coverage
        if: matrix.os == 'ubuntu-latest'
        run: pnpm test:coverage

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
