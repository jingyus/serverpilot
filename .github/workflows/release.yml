name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build-agent-binary:
    name: Build Agent (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            target: bun-linux-x64
          - os: ubuntu-latest
            name: linux-arm64
            target: bun-linux-arm64
          - os: macos-latest
            name: darwin-arm64
            target: bun-darwin-arm64
          - os: macos-13
            name: darwin-x64
            target: bun-darwin-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Agent binary
        run: bun scripts/build-binary.ts --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.name }}
          path: packages/agent/dist/bin/install-agent-*
          retention-days: 1

  docker-release:
    name: Publish Docker Images
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GHCR_REGISTRY: ghcr.io
      GHCR_SERVER_IMAGE: ghcr.io/${{ github.repository }}/server
      GHCR_DASHBOARD_IMAGE: ghcr.io/${{ github.repository }}/dashboard
      DOCKERHUB_SERVER_IMAGE: serverpilot/server
      DOCKERHUB_DASHBOARD_IMAGE: serverpilot/dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_SERVER_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_SERVER_IMAGE }}:latest
            ${{ env.DOCKERHUB_SERVER_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_SERVER_IMAGE }}:latest
          cache-from: type=gha,scope=server-release
          cache-to: type=gha,scope=server-release,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_DASHBOARD_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_DASHBOARD_IMAGE }}:latest
            ${{ env.DOCKERHUB_DASHBOARD_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_DASHBOARD_IMAGE }}:latest
          cache-from: type=gha,scope=dashboard-release
          cache-to: type=gha,scope=dashboard-release,mode=max

  create-release:
    name: Create GitHub Release
    needs: [build-agent-binary, docker-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/agent-*; do
            cp "$dir"/* release-assets/ 2>/dev/null || true
          done
          ls -la release-assets/

      - name: Extract CHANGELOG notes
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract notes between the version heading and the next heading
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          # Trim leading/trailing blank lines
          NOTES=$(echo "$NOTES" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          # Write to file for the release action
          echo "$NOTES" > release-notes-changelog.md

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            cat release-notes-changelog.md
            echo ""
            echo "---"
            echo ""
            echo "## Docker Images"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository }}/server:${VERSION}"
            echo "docker pull ghcr.io/${{ github.repository }}/dashboard:${VERSION}"
            echo '```'
            echo ""
            echo "## Agent Binaries"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x64 | \`install-agent-linux-x64\` |"
            echo "| Linux | arm64 | \`install-agent-linux-arm64\` |"
            echo "| macOS | arm64 (Apple Silicon) | \`install-agent-darwin-arm64\` |"
            echo "| macOS | x64 (Intel) | \`install-agent-darwin-x64\` |"
            echo ""
            echo "## Quick Start"
            echo ""
            echo '```bash'
            echo "docker compose up -d"
            echo '```'
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
