# ==============================================================================
# ServerPilot - Docker Compose Configuration
# ==============================================================================
# Usage:
#   ./init.sh              # First install: guided setup + start
#   docker compose up -d   # Start in background
#   docker compose logs -f # Follow logs
#   docker compose down    # Stop and remove containers
# ==============================================================================
# Zero-configuration deployment using SQLite. No database setup required!
# Dashboard accessible at http://localhost:${DASHBOARD_PORT:-3001}
# Server API/WebSocket at http://localhost:${SERVER_PORT:-3000}
# ==============================================================================
# Pre-built images (skip local build):
#   docker pull serverpilot/server:latest
#   docker pull serverpilot/dashboard:latest
# Or use GHCR:
#   docker pull ghcr.io/<owner>/serverpilot/server:latest
#   docker pull ghcr.io/<owner>/serverpilot/dashboard:latest
# Pinned versions (recommended for production):
#   serverpilot/server:0.3.0   serverpilot/dashboard:0.3.0
# ==============================================================================

services:
  # ==============================================================================
  # ServerPilot Server (REST API + WebSocket + SQLite)
  # ==============================================================================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: serverpilot/server:latest
    container_name: serverpilot-server
    restart: unless-stopped
    stop_grace_period: 15s
    environment:
      - NODE_ENV=production
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      - DATABASE_PATH=/data/serverpilot.db
      - JWT_SECRET=${JWT_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-claude}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-20250514}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-30000}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - CUSTOM_OPENAI_BASE_URL=${CUSTOM_OPENAI_BASE_URL:-}
      - CUSTOM_OPENAI_API_KEY=${CUSTOM_OPENAI_API_KEY:-}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}
      - GITHUB_OAUTH_REDIRECT_URI=${GITHUB_OAUTH_REDIRECT_URI:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WS_HEARTBEAT_INTERVAL_MS=${WS_HEARTBEAT_INTERVAL_MS:-30000}
      - WS_CONNECTION_TIMEOUT_MS=${WS_CONNECTION_TIMEOUT_MS:-10000}
      - WS_REQUIRE_AUTH=${WS_REQUIRE_AUTH:-true}
      - KNOWLEDGE_BASE_DIR=/app/knowledge-base
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - server-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - serverpilot-network

  # ==============================================================================
  # ServerPilot Agent (Daemon Mode — co-located server management)
  # ==============================================================================
  agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile
    image: serverpilot/agent:latest
    container_name: serverpilot-agent
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - SP_SERVER_URL=ws://server:3000
    volumes:
      - server-data:/data:ro
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - serverpilot-network

  # ==============================================================================
  # ServerPilot Dashboard (Nginx + Static Frontend)
  # ==============================================================================
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    image: serverpilot/dashboard:latest
    container_name: serverpilot-dashboard
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3001}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - serverpilot-network

networks:
  serverpilot-network:
    driver: bridge

volumes:
  server-data:
    driver: local
