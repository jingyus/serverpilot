# ==============================================================================
# ServerPilot - Docker Compose Configuration
# ==============================================================================
# Usage:
#   cp .env.example .env   # Configure environment variables (optional)
#   docker compose up -d   # Start in background
#   docker compose logs -f # Follow logs
#   docker compose down    # Stop and remove containers
# ==============================================================================
# Note: This is a zero-configuration deployment using SQLite.
#       No database setup required - works out of the box!
# ==============================================================================

services:
  # ==============================================================================
  # ServerPilot Server (REST API + WebSocket + SQLite)
  # ==============================================================================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: aiinstaller-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      - DATABASE_PATH=/data/serverpilot.db
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret_change_in_production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-20250514}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-30000}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - WS_HEARTBEAT_INTERVAL_MS=${WS_HEARTBEAT_INTERVAL_MS:-30000}
      - WS_CONNECTION_TIMEOUT_MS=${WS_CONNECTION_TIMEOUT_MS:-10000}
      - WS_REQUIRE_AUTH=${WS_REQUIRE_AUTH:-true}
      - KNOWLEDGE_BASE_DIR=/app/knowledge-base
    volumes:
      - server-data:/data
      - knowledge-base:/app/knowledge-base
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - aiinstaller-network

  # ==============================================================================
  # ServerPilot Dashboard (Nginx + Static Frontend)
  # ==============================================================================
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: aiinstaller-dashboard
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    networks:
      - aiinstaller-network

networks:
  aiinstaller-network:
    driver: bridge

volumes:
  server-data:
    driver: local
  knowledge-base:
    driver: local
