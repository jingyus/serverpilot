# ==============================================================================
# ServerPilot - Docker Compose Configuration
# ==============================================================================
# Usage:
#   ./init.sh              # First install: guided setup + start
#   docker compose up -d   # Start in background
#   docker compose logs -f # Follow logs
#   docker compose down    # Stop and remove containers
# ==============================================================================
# Zero-configuration deployment using SQLite. No database setup required!
# Dashboard accessible at http://localhost:${DASHBOARD_PORT:-3001}
# ==============================================================================

services:
  # ==============================================================================
  # ServerPilot Server (REST API + WebSocket + SQLite)
  # ==============================================================================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: serverpilot/server:latest
    container_name: serverpilot-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SERVER_PORT=3000
      - SERVER_HOST=0.0.0.0
      - DATABASE_PATH=/data/serverpilot.db
      - JWT_SECRET=${JWT_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-20250514}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-30000}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - WS_HEARTBEAT_INTERVAL_MS=${WS_HEARTBEAT_INTERVAL_MS:-30000}
      - WS_CONNECTION_TIMEOUT_MS=${WS_CONNECTION_TIMEOUT_MS:-10000}
      - WS_REQUIRE_AUTH=${WS_REQUIRE_AUTH:-true}
      - KNOWLEDGE_BASE_DIR=/app/knowledge-base
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      - server-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - serverpilot-network

  # ==============================================================================
  # ServerPilot Dashboard (Nginx + Static Frontend)
  # ==============================================================================
  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    image: serverpilot/dashboard:latest
    container_name: serverpilot-dashboard
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3001}:80"
    networks:
      - serverpilot-network

networks:
  serverpilot-network:
    driver: bridge

volumes:
  server-data:
    driver: local
