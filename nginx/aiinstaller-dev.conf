# ==============================================================================
# AI Installer - Development Nginx Configuration (HTTP only)
# ==============================================================================
# This configuration is for local development and testing without SSL
# ==============================================================================

# Upstream backend server
upstream aiinstaller_backend_dev {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP server
server {
    listen 80;
    listen [::]:80;
    server_name localhost api.aiinstaller.local;

    # Logging
    access_log /var/log/nginx/aiinstaller_dev_access.log combined;
    error_log /var/log/nginx/aiinstaller_dev_error.log debug;

    # Client settings
    client_max_body_size 10M;

    # WebSocket proxy configuration
    location / {
        # Proxy settings
        proxy_pass http://aiinstaller_backend_dev;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for WebSocket connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering (disabled for WebSocket)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://aiinstaller_backend_dev/health;
        access_log off;
    }
}
