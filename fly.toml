# ==============================================================================
# AI Installer Server - Fly.io Configuration
# ==============================================================================
# Deploy with: fly deploy
# View status: fly status
# View logs:   fly logs
# ==============================================================================

app = "aiinstaller-server"
primary_region = "nrt"

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  NODE_ENV = "production"
  SERVER_PORT = "3000"
  SERVER_HOST = "0.0.0.0"
  LOG_LEVEL = "info"
  KNOWLEDGE_BASE_DIR = "/app/knowledge-base"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
